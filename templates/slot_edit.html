{% extends "layout.html" %}
{% block content %}
<h1>Edit slot</h1>
{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}
<form method="POST" action="/slots/{{ slot['id'] }}/edit">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">

    <label for="space_id">Space</label>
    <select id="space_id" name="space_id">
        {% for space in spaces %}
            <option value="{{ space['id'] }}"
                {% if space['id'] == slot['space_id'] %}selected{% endif %}>
                {{ space['name'] }}
            </option>
        {% endfor %}
    </select>

    <label for="start_time">Start time</label>
    <input type="datetime-local" id="start_time" name="start_time"
           value="{{ slot['start_time'] }}" required>

    <label for="end_time">End time</label>
    <input type="datetime-local" id="end_time" name="end_time"
           value="{{ slot['end_time'] }}" required>

    <button type="submit">Save changes</button>
</form>
{% endblock %}
